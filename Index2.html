<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet + Esri</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div id="map" style="height: 500px;"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>

    <script>
        // Initialize the Leaflet map
        const map = L.map('map').setView([44.5646, -123.2620], 13);

        // Add a base layer (OpenStreetMap tiles)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);


// Fetch data directly from the FeatureServer query
fetch('https://services1.arcgis.com/dePSdaG71BplHMCO/arcgis/rest/services/Motorcycle/FeatureServer/1/query?where=1%3D1&outFields=*&f=geojson')
  .then(response => {
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    return response.json();
  })
  .then(data => {
    L.geoJSON(data, {
      style: { color: 'red', weight: 2 },
      onEachFeature: function (feature, layer) {
        layer.bindPopup(`Motorcycle Info:<br>ID: ${feature.properties?.OBJECTID || 'N/A'}`);
      }
    }).addTo(map);
  })
  .catch(error => console.error('Error loading data:', error));



    </script>
</body>
</html>
